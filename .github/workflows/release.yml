name: Publish tagged release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y busybox zip

      - name: Validate tag and module version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's/^version=//p' module/module.prop | head -n 1)
          test "$version" = "$GITHUB_REF_NAME"

      - name: Build release package
        run: ./scripts/build.sh

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/*.zip dist/*.sha256 --clobber
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/*.zip dist/*.sha256 \
              --title "NeoRender Engine $GITHUB_REF_NAME" \
              --notes-file RELEASE_NOTES.md
          fi
